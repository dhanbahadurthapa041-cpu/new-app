<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="attendance_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>attendance_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(13, 148, 136, 0.28), transparent 34%),
        linear-gradient(160deg, #0f172a 0%, #111827 50%, #0b1120 100%);
      color: #e2e8f0;
      opacity: 1;
      transition: opacity 280ms ease, visibility 280ms ease;
    }

    #app-splash.app-splash-hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .splash-card {
      width: min(360px, 100%);
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      background: rgba(30, 41, 59, 0.72);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.24);
      text-align: center;
      backdrop-filter: blur(14px);
    }

    .splash-logo {
      display: inline-flex;
      width: 58px;
      height: 58px;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: linear-gradient(135deg, #0d9488, #10b981);
      color: #ffffff;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(13, 148, 136, 0.3);
    }

    .splash-title {
      margin: 18px 0 6px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .splash-subtitle {
      margin: 0 0 22px;
      color: rgba(226, 232, 240, 0.76);
      font-size: 14px;
      line-height: 1.5;
    }

    .splash-progress {
      position: relative;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
    }

    .splash-progress::before {
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0d9488, #f97316);
      content: "";
      animation: splash-progress 1.1s ease-in-out infinite;
    }

    @keyframes splash-progress {
      0% {
        transform: translateX(-115%);
      }
      100% {
        transform: translateX(250%);
      }
    }

    @media (prefers-color-scheme: light) {
      body {
        background: #f8fafc;
      }

      #app-splash {
        background:
          radial-gradient(circle at top left, rgba(13, 148, 136, 0.18), transparent 34%),
          linear-gradient(160deg, #f8fafc 0%, #eff6ff 55%, #ffffff 100%);
        color: #0f172a;
      }

      .splash-card {
        border-color: rgba(255, 255, 255, 0.72);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
      }

      .splash-subtitle {
        color: rgba(15, 23, 42, 0.64);
      }

      .splash-progress {
        background: rgba(13, 148, 136, 0.12);
      }
    }
  </style>
</head>
<body>
  <div id="app-splash" aria-label="Loading Shree Bhawani Academy attendance app">
    <div class="splash-card">
      <div class="splash-logo">S</div>
      <h1 class="splash-title">Shree Bhawani Academy</h1>
      <p class="splash-subtitle">Starting attendance dashboard</p>
      <div class="splash-progress" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    (function () {
      var removed = false;

      function removeSplash() {
        if (removed) {
          return;
        }
        removed = true;

        var splash = document.getElementById('app-splash');
        if (!splash) {
          return;
        }

        splash.classList.add('app-splash-hidden');
        window.setTimeout(function () {
          if (splash.parentNode) {
            splash.parentNode.removeChild(splash);
          }
        }, 320);
      }

      window.addEventListener('flutter-first-frame', removeSplash, { once: true });
      window.attendanceAppRemoveSplash = removeSplash;

      var observer = new MutationObserver(function () {
        if (document.querySelector('flutter-view')) {
          window.setTimeout(removeSplash, 250);
          observer.disconnect();
        }
      });

      observer.observe(document.body, { childList: true, subtree: true });
      window.setTimeout(removeSplash, 12000);
    })();
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
